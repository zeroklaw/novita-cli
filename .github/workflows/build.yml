name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0, or 'latest' for rolling)"
        required: true
        default: "latest"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (linux/x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Stage binary
        run: |
          cp target/x86_64-unknown-linux-musl/release/novita novita-linux-x86_64
          chmod +x novita-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: novita-linux-x86_64
          path: novita-linux-x86_64

  build-macos:
    name: Build (macos/arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: cargo build --release --target aarch64-apple-darwin

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Stage binary
        run: |
          cp target/aarch64-apple-darwin/release/novita novita-macos-arm64
          chmod +x novita-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: novita-macos-arm64
          path: novita-macos-arm64

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mv artifacts/novita-linux-x86_64/novita-linux-x86_64 .
          mv artifacts/novita-macos-arm64/novita-macos-arm64 .

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "${{ inputs.tag == 'latest' && 'Latest Build' || inputs.tag }}"
          body: |
            **Tag:** `${{ inputs.tag }}`
            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.run_id }}

            ### Download
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `novita-linux-x86_64` |
            | macOS arm64 | `novita-macos-arm64` |

            ### Usage
            ```bash
            # Linux
            curl -sL https://github.com/zeroklaw/novita-cli/releases/download/${{ inputs.tag }}/novita-linux-x86_64 \
              -o /usr/local/bin/novita && chmod +x /usr/local/bin/novita

            # macOS (Apple Silicon)
            curl -sL https://github.com/zeroklaw/novita-cli/releases/download/${{ inputs.tag }}/novita-macos-arm64 \
              -o /usr/local/bin/novita && chmod +x /usr/local/bin/novita
            ```
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.tag != 'latest' }}
          files: |
            novita-linux-x86_64
            novita-macos-arm64
